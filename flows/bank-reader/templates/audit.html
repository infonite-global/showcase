<!-- CATEGORY VIEW: AUDIT LOG -->
<div class="h-full w-full rounded-3xl bg-white border border-slate-100 shadow-sm flex flex-col p-8 fade-in">
    
    <!-- View Header -->
    <div class="flex items-center gap-4 mb-8">
        <div class="w-12 h-12 rounded-2xl bg-[var(--primary-container)] text-[var(--primary)] flex items-center justify-center text-xl shadow-sm border border-[var(--primary)]/20">
            <i class="fa-solid fa-shield-halved"></i>
        </div>
        <div>
            <h2 class="text-xl font-black text-slate-800 tracking-tight">Audit Log</h2>
            <p class="text-xs font-medium text-slate-500 mt-1">Cryptographic signatures and access logs for this session.</p>
        </div>
    </div>

    <!-- Scrollable Content -->
    <div class="flex-1 overflow-y-auto pr-2 pb-6 custom-scrollbar">
        
        <!-- Connections Section -->
        <div class="mb-8">
            <h3 class="text-sm font-black uppercase tracking-widest text-slate-800 border-b border-slate-100 pb-3 mb-4 flex items-center gap-2">
                <i class="fa-solid fa-network-wired text-[var(--primary)]"></i> Engine Connections
            </h3>
            
            <div id="listConnections" class="flex flex-col gap-3">
                <!-- Injected via JS -->
                <p class="text-sm text-slate-400 font-medium italic">No engine connections recorded.</p>
            </div>
        </div>

        <!-- Consent Details Section -->
        <div>
            <h3 class="text-sm font-black uppercase tracking-widest text-slate-800 border-b border-slate-100 pb-3 mb-4 flex items-center gap-2">
                <i class="fa-solid fa-file-signature text-[var(--primary)]"></i> Consent Details
            </h3>
            
            <div class="bg-slate-50 border border-slate-100 rounded-2xl p-5 mb-4 grid grid-cols-1 md:grid-cols-3 gap-6">
                <!-- Metadata Points -->
                <div class="flex flex-col">
                    <span class="text-[10px] font-bold tracking-widest uppercase text-slate-400">Accepted Date</span>
                    <span class="text-sm font-semibold text-slate-700 mt-1 font-mono tracking-tight" id="lblConsentDate">--</span>
                </div>
                <div class="flex flex-col">
                    <span class="text-[10px] font-bold tracking-widest uppercase text-slate-400">User IP</span>
                    <span class="text-sm font-semibold text-slate-700 mt-1 font-mono tracking-tight" id="lblConsentIp">--</span>
                </div>
                <div class="col-span-1 md:col-span-2 flex flex-col pt-4 border-t border-slate-200/50">
                    <span class="text-[10px] font-bold tracking-widest uppercase text-slate-400">Origin Source</span>
                    <div class="flex items-center gap-1.5 mt-1">
                        <i class="fa-solid fa-link text-slate-300 text-xs"></i>
                        <span class="text-sm font-semibold text-slate-700 font-mono tracking-tight" id="lblConsentOrigin">--</span>
                    </div>
                </div>
                
                <div class="col-span-1 md:col-span-3 flex flex-col pt-4 border-t border-slate-200/50">
                    <div class="flex flex-wrap items-center gap-2 mb-1">
                        <span class="text-[10px] font-bold tracking-widest uppercase text-slate-400">User Agent</span>
                        <span id="lblUaTypeBadge" class="hidden px-2 py-0.5 rounded bg-slate-200 text-slate-600 text-[9px] font-bold uppercase tracking-widest"></span>
                    </div>
                    <span class="text-xs font-semibold text-slate-500 font-mono tracking-tight break-all" id="lblConsentUa">--</span>
                </div>
            </div>

            <div class="flex flex-col gap-2">
                <span class="text-xs font-bold uppercase tracking-widest text-slate-500 mb-1">Consent Features Granted:</span>
                <div class="flex flex-wrap gap-2" id="listConsentFeatures">
                    <!-- Injected via JS -->
                    <span class="text-sm text-slate-400 italic">None registered</span>
                </div>
            </div>

        </div>
        
    </div>
</div>
